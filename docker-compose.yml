version: '3'

services:
  web:
    build: .
    image: ${DOCKER_IMAGE:-gcr.io/esaasolution/csa247}:${IMAGE_TAG:-latest}
    expose:
      - 8000
    env_file:
      - .env
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - db
    command: gunicorn 247csa.wsgi:application --bind 0.0.0.0:8000 --workers 3

  db:
    image: mysql:8.0
    env_file:
      - .env
    volumes:
      - mysql_data:/var/lib/mysql

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - web

volumes:
  mysql_data:
  static_volume:
  media_volume: 