name: Deploy to Google Cloud VM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PROJECT_ID: esaasolution
  GCE_INSTANCE: csa247
  GCE_INSTANCE_ZONE: us-central1-a
  DOCKER_IMAGE: gcr.io/esaasolution/csa247

jobs:
  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Google Auth
      id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker
      run: gcloud auth configure-docker

    - name: Create env file
      run: |
        echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env
        echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
        echo "DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}" >> .env
        echo "DOCKER_ENVIRONMENT=true" >> .env

    - name: Build and Push Docker Image
      run: |
        docker build -t $DOCKER_IMAGE:${{ github.sha }} .
        docker push $DOCKER_IMAGE:${{ github.sha }}

    - name: Deploy to VM Instance
      run: |
        gcloud compute scp .env $GCE_INSTANCE:~/ --zone=$GCE_INSTANCE_ZONE
        gcloud compute ssh --zone $GCE_INSTANCE_ZONE $GCE_INSTANCE --command '
          docker pull ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          echo "IMAGE_TAG=${{ github.sha }}" >> .env
          docker-compose down
          docker-compose up -d
        '